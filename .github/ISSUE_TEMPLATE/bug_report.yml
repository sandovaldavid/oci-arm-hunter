name: Bug Report
description: Something is not working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, check if the issue was already reported.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make setup` with compartment X
        2. Select subnet Y
        3. Run `make run`
        4. Error appears
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste relevant lines from `cazador.log` or terminal output.
      render: shell

  - type: input
    id: oci_cli_version
    attributes:
      label: oci-cli version
      placeholder: "3.x.x (run: oci --version)"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 22.04 / Oracle Linux 8 / Fedora 40"
    validations:
      required: true
